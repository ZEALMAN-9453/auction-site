<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

/* ===== 背景 ===== */
body {
  margin:0;
  font-family: 'Orbitron', Arial;
  text-align:center;

  background: url("bg.png") no-repeat center center fixed;
  background-size: cover;
}

/* 黑遮罩 */
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}

/* ===== LOGO ===== */
.logo {
  margin-top:20px;
}

.logo img {
  width:300px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 10px #fff); }
  to { filter: drop-shadow(0 0 30px #00f0ff); }
}

/* ===== 卡片 ===== */
.box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(15px);
  color:white;
  padding:20px;
  margin:20px auto;
  width:340px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,255,0.3);
}

/* ===== 文字 ===== */
h2 { color:#00f0ff; text-shadow:0 0 10px #00f0ff; }
p { font-size:16px; }

/* ===== 輸入 ===== */
input {
  width:90%;
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

/* ===== 按鈕 ===== */
button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background: linear-gradient(45deg,#00f0ff,#7a00ff);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.1);
  box-shadow:0 0 20px #00f0ff;
}

/* 排行榜 */
#rank p {
  text-shadow:0 0 5px #fff;
}

</style>
</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="bg.png">
</div>

<!-- 拍賣 -->
<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<!-- 排行榜 -->
<div class="box">
  <h3>排行榜 TOP 5</h3>
  <div id="rank"></div>
</div>

<!-- 管理員 -->
<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPass" type="password">
  <button onclick="adminLogin()">登入</button>
</div>

<div class="box" id="adminBox" style="display:none;">
  <h3>管理員控制</h3>
  <input id="setItem" placeholder="商品名稱">
  <input id="setTime" type="number" placeholder="秒數">
  <button onclick="startAuction()">開始拍賣</button>
</div>

<script>

// Firebase
var firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 登入
function login(){
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText="👤 "+user.displayName;
  }
});

// 同步
db.ref("auction").on("value",snap=>{
  const d=snap.val();
  if(!d)return;
  document.getElementById("item").innerText="拍賣："+d.item;
  document.getElementById("price").innerText=d.price;
  document.getElementById("name").innerText=d.name;
});

// 倒數
setInterval(()=>{
  db.ref("auction").once("value").then(s=>{
    const d=s.val();
    if(!d||!d.endAt)return;
    const left=Math.max(0,Math.floor((d.endAt-Date.now())/1000));
    document.getElementById("time").innerText=left;
  });
},1000);

// 出價 + 延長
function bid(){
  const user=firebase.auth().currentUser;
  if(!user)return alert("先登入");

  const price=parseInt(document.getElementById("bidInput").value);

  db.ref("auction").once("value").then(s=>{
    const d=s.val();
    if(price<=d.price)return;

    let endAt=d.endAt;
    const left=Math.floor((d.endAt-Date.now())/1000);

    if(left<=10){
      endAt+=30000;
    }

    db.ref("auction").update({
      price:price,
      name:user.displayName,
      endAt:endAt
    });

    db.ref("auction/bids/"+user.uid).set({
      price:price,
      name:user.displayName
    });
  });
}

// 排行榜
db.ref("auction/bids").on("value",snap=>{
  const data=snap.val();
  if(!data)return;

  let arr=Object.values(data);
  arr.sort((a,b)=>b.price-a.price);

  let html="";
  arr.slice(0,5).forEach((u,i)=>{
    html+=`<p>${i+1}. ${u.name} - ${u.price}</p>`;
  });

  document.getElementById("rank").innerHTML=html;
});

// 管理員
const ADMIN_PASSWORD="123456";

function adminLogin(){
  if(document.getElementById("adminPass").value===ADMIN_PASSWORD){
    document.getElementById("adminBox").style.display="block";
  }
}

function startAuction(){
  const item=document.getElementById("setItem").value;
  const time=parseInt(document.getElementById("setTime").value);

  db.ref("auction").set({
    item:item,
    price:0,
    name:"無",
    endAt:Date.now()+time*1000,
    ended:false,
    bids:{}
  });
}

</script>

</body>
</html>
