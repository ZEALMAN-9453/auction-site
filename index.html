<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（最終完整版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:url("bg.png") no-repeat center/cover fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}
.box{
  background:rgba(0,0,0,0.75);
  color:#fff;
  padding:20px;
  margin:10px;
  width:360px;
  border-radius:15px;
  text-align:center;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00bfff;
  color:#fff;
  cursor:pointer;
}
input{
  padding:8px;
  margin:5px;
  width:80%;
}

/* 結算動畫 */
#winEffect{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  font-size:32px;
  color:gold;
  opacity:0;
  transition:.25s;
  text-shadow:0 0 20px gold, 0 0 40px rgba(255,215,0,.6);
  z-index:9999;
}
#winEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.2);
}
.small{font-size:14px;opacity:.8}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="bidder">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user" class="small"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>得標紀錄（10筆）</h3>
  <div id="history"></div>
</div>

<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPwd" type="password" placeholder="密碼">
  <button onclick="adminLogin()">登入</button>
</div>

<div class="box" id="adminPanel" style="display:none;">
  <h3>5連拍設定（名稱＋秒數）</h3>
  <div id="editor"></div>
  <button onclick="saveItems()">儲存商品</button>
  <button onclick="startAuction()">開始5連拍</button>
</div>

<div id="winEffect"></div>

<script>
// ===== Firebase =====
firebase.initializeApp({
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = firebase.database();

// ===== 常數 =====
const ADMIN_PASSWORD = "800430";
const EXTEND_THRESHOLD = 10; // 最後10秒
const EXTEND_MS = 30000;     // 延長30秒

// ===== DOM =====
const elItem   = document.getElementById("item");
const elPrice  = document.getElementById("price");
const elBidder = document.getElementById("bidder"); // 避開 id=name 衝突
const elTime   = document.getElementById("time");
const elUser   = document.getElementById("user");
const elHist   = document.getElementById("history");
const elWin    = document.getElementById("winEffect");

// ===== 登入 =====
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u){
    elUser.innerText = "👤 " + (u.displayName || u.email || "玩家");
  }else{
    elUser.innerText = "";
  }
});

// ===== 管理員 =====
function adminLogin(){
  if(document.getElementById("adminPwd").value === ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
    loadEditor();
  }else{
    alert("密碼錯誤");
  }
}

function loadEditor(){
  db.ref("items").once("value").then(s=>{
    let items = s.val() || [
      {item:"商品1", time:60},
      {item:"商品2", time:60},
      {item:"商品3", time:60},
      {item:"商品4", time:60},
      {item:"商品5", time:60},
    ];
    const html = items.map((it,i)=>`
      <div>
        <input id="name_${i}" value="${it.item}">
        <input id="time_${i}" type="number" value="${it.time}">
      </div>
    `).join("");
    document.getElementById("editor").innerHTML = html;
  });
}

function saveItems(){
  const arr = [];
  for(let i=0;i<5;i++){
    arr.push({
      item: document.getElementById("name_"+i).value || `商品${i+1}`,
      time: parseInt(document.getElementById("time_"+i).value) || 60
    });
  }
  db.ref("items").set(arr);
  alert("已儲存");
}

function startAuction(){
  db.ref("items").once("value").then(s=>{
    const items = s.val();
    if(!items || !items.length){ alert("沒有商品"); return; }

    db.ref("currentIndex").set(0);

    db.ref("auction").set({
      item: items[0].item,
      price: 0,
      name: "無",
      endAt: Date.now() + items[0].time*1000,
      ended: false
    });
  });
}

// ===== 同步 auction（只做顯示）=====
let current = null;
db.ref("auction").on("value", snap=>{
  current = snap.val();
  if(!current) return;

  elItem.innerText   = current.item || "";
  elPrice.innerText  = current.price || 0;
  elBidder.innerText = current.name || "無";
});

// ===== 倒數（本地計算，穩定）=====
setInterval(()=>{
  if(!current || !current.endAt) return;

  const t = Math.max(0, Math.floor((current.endAt - Date.now())/1000));
  elTime.innerText = t;

  if(t <= 0 && !current.ended){
    finishAuction();
  }
}, 1000);

// ===== 出價（含最後10秒延長30秒）=====
function bid(){
  const u = firebase.auth().currentUser;
  if(!u){ alert("請先登入"); return; }

  const val = parseInt(document.getElementById("bidInput").value);
  if(isNaN(val)){ return; }

  db.ref("auction").transaction(d=>{
    if(!d) return d;
    if(val <= (d.price||0)) return; // 必須更高

    d.price = val;
    d.name  = u.displayName || u.email || "玩家";

    // 最後10秒延長30秒
    const remain = (d.endAt - Date.now())/1000;
    if(remain <= EXTEND_THRESHOLD){
      d.endAt += EXTEND_MS;
    }
    return d;
  });
}

// ===== 動畫 =====
function showWin(text){
  elWin.innerText = text;
  elWin.classList.add("show");
  setTimeout(()=> elWin.classList.remove("show"), 1400);
}

// ===== 結算（寫歷史 + 只留10筆 + 下一個）=====
function finishAuction(){
  db.ref("auction").transaction(d=>{
    if(!d || d.ended) return;
    d.ended = true;
    return d;
  }, (e, ok, snap)=>{
    if(!ok) return;

    const d = snap.val();

    // 有人得標
    if(d.price > 0 && d.name && d.name !== "無"){
      const newRef = db.ref("history").push();
      newRef.set({
        item: d.item,
        name: d.name,
        price: d.price,
        time: Date.now()
      });

      showWin(`🎉 ${d.name} 得標 ${d.price}`);

      // 只保留10筆（刪最舊）
      db.ref("history").once("value").then(s=>{
        const data = s.val();
        if(!data) return;
        const arr = Object.entries(data)
          .map(([k,v])=>({k, t:v.time||0}))
          .sort((a,b)=>a.t-b.t); // 舊→新
        if(arr.length > 10){
          const remove = arr.slice(0, arr.length-10);
          remove.forEach(x=> db.ref("history/"+x.k).remove());
        }
      });

    }else{
      // 流標
      showWin("❌ 流標");
    }

    // 下一個
    db.ref("currentIndex").once("value").then(s=>{
      let idx = s.val() || 0;
      idx++;

      db.ref("items").once("value").then(s2=>{
        const items = s2.val() || [];
        if(idx >= items.length){
          showWin("🏁 全部拍完");
          return;
        }
        db.ref("currentIndex").set(idx);

        db.ref("auction").set({
          item: items[idx].item,
          price: 0,
          name: "無",
          endAt: Date.now() + items[idx].time*1000,
          ended: false
        });
      });
    });

  });
}

// ===== 歷史顯示（最多10筆）=====
db.ref("history").on("value", snap=>{
  const data = snap.val();
  if(!data){
    elHist.innerHTML = "尚無紀錄";
    return;
  }
  const arr = Object.values(data)
    .filter(h=>h && h.item)
    .sort((a,b)=> (b.time||0) - (a.time||0));

  elHist.innerHTML = arr.slice(0,10)
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
    .join("");
});
</script>

</body>
</html>
