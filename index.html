<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（固定5輪播）</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background: url("bg.png") no-repeat center center fixed;
  background-size: cover;
}
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}

.box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color:white;
  padding:20px;
  margin:20px auto;
  width:340px;
  border-radius:15px;
}

button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background: linear-gradient(45deg,#00f0ff,#7a00ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>排行榜</h3>
  <div id="rank"></div>
</div>

<div class="box">
  <h3>得標紀錄</h3>
  <div id="history"></div>
</div>

<div class="box">
  <h3>管理員</h3>
  <button onclick="startAll()">開始5連拍</button>
</div>

<script>
// Firebase
var firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// 登入
function login(){
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText="👤 "+user.displayName;
  }
});

// 同步
db.ref("auction").on("value",snap=>{
  const d=snap.val();
  if(!d)return;
  item.innerText=d.item;
  price.innerText=d.price;
  name.innerText=d.name;
});

// 倒數 + 自動換
setInterval(()=>{
  db.ref("auction").once("value").then(s=>{
    const d=s.val();
    if(!d||!d.endAt)return;

    const left=Math.max(0,Math.floor((d.endAt-Date.now())/1000));
    time.innerText=left;

    if(left<=0 && !d.ended){
      finishAuction(d);
    }
  });
},1000);

// 出價
function bid(){
  const user=firebase.auth().currentUser;
  if(!user)return alert("先登入");

  const priceVal=parseInt(bidInput.value);

  db.ref("auction").once("value").then(s=>{
    const d=s.val();
    if(priceVal<=d.price)return;

    let endAt=d.endAt;
    const left=Math.floor((d.endAt-Date.now())/1000);

    if(left<=10){
      endAt+=30000;
    }

    db.ref("auction").update({
      price:priceVal,
      name:user.displayName,
      endAt:endAt
    });

    db.ref("auction/bids/"+user.uid).set({
      price:priceVal,
      name:user.displayName
    });
  });
}

// 🔥 結束 → 自動下一個
function finishAuction(d){

  db.ref("history").push({
    item:d.item,
    name:d.name,
    price:d.price
  });

  db.ref("currentIndex").once("value").then(iSnap=>{
    let i=iSnap.val()+1;

    db.ref("items").once("value").then(snap=>{
      const items=snap.val();

      if(i>=items.length){
        alert("全部拍完");
        db.ref("auction/ended").set(true);
        return;
      }

      const next=items[i];

      db.ref("currentIndex").set(i);

      db.ref("auction").set({
        item:next.item,
        price:0,
        name:"無",
        endAt:Date.now()+next.time*1000,
        ended:false,
        bids:{}
      });

    });
  });
}

// 🔥 開始全部
function startAll(){

  const items=[
    {item:"裝備1",time:60},
    {item:"裝備2",time:60},
    {item:"裝備3",time:60},
    {item:"裝備4",time:60},
    {item:"裝備5",time:60}
  ];

  db.ref("items").set(items);
  db.ref("currentIndex").set(0);

  const first=items[0];

  db.ref("auction").set({
    item:first.item,
    price:0,
    name:"無",
    endAt:Date.now()+first.time*1000,
    ended:false,
    bids:{}
  });
}

// 排行榜
db.ref("auction/bids").on("value",snap=>{
  const data=snap.val();
  if(!data)return;

  let arr=Object.values(data);
  arr.sort((a,b)=>b.price-a.price);

  let html="";
  arr.forEach(u=>{
    html+=`<p>${u.name} - ${u.price}</p>`;
  });

  rank.innerHTML=html;
});

// 得標紀錄
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data)return;

  let html="";
  Object.values(data).reverse().forEach(h=>{
    html+=`<p>${h.item} - ${h.name} (${h.price})</p>`;
  });

  history.innerHTML=html;
});
</script>

</body>
</html>
