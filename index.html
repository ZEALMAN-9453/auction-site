<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（穩定完整版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("bg.png") no-repeat center/cover fixed;

  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.box{
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:20px;
  margin:10px 0;
  width:360px;
  border-radius:15px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00bfff;
  color:white;
}

input{
  padding:8px;
  margin:5px;
  width:80%;
}
</style>
</head>

<body>

<!-- 拍賣 -->
<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>價格：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘：<span id="time">0</span> 秒</p>

  <button onclick="login()">登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number">
  <button onclick="bid()">出價</button>
</div>

<!-- 歷史 -->
<div class="box">
  <h3>得標紀錄</h3>
  <div id="history"></div>
</div>

<!-- 🔥 管理員（永遠存在） -->
<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPwd" type="password" placeholder="輸入密碼">
  <button onclick="adminLogin()">登入</button>
</div>

<!-- 🔥 後台（預設隱藏） -->
<div class="box" id="adminPanel" style="display:none;">
  <h3>管理員後台</h3>
  <button onclick="startAll()">開始拍賣</button>
</div>

<script>

// Firebase
var config={
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(config);
var db=firebase.database();

const ADMIN_PASSWORD="800430";

// 登入
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u) user.innerText=u.displayName;
});

// 管理員登入（🔥這裡是關鍵）
function adminLogin(){
  const pwd=document.getElementById("adminPwd").value;

  if(pwd===ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display="block";
    alert("登入成功");
  }else{
    alert("密碼錯誤");
  }
}

// UI同步
db.ref("auction").on("value",snap=>{
  const d=snap.val();
  if(!d)return;

  item.innerText=d.item;
  price.innerText=d.price;
  name.innerText=d.name;
});

// 倒數
setInterval(async ()=>{
  const d=(await db.ref("auction").once("value")).val();
  if(!d||!d.endAt)return;

  time.innerText=Math.max(0,Math.floor((d.endAt-Date.now())/1000));
},1000);

// 出價
function bid(){
  const u=firebase.auth().currentUser;
  if(!u)return alert("請登入");

  const val=parseInt(bidInput.value);
  if(isNaN(val))return;

  db.ref("auction").transaction(d=>{
    if(!d)return d;
    if(val<=d.price)return;

    d.price=val;
    d.name=u.displayName;
    return d;
  });
}

// 歷史顯示
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data){
    history.innerHTML="無紀錄";
    return;
  }

  let arr=[];
  for(let k in data){
    arr.push(data[k]);
  }

  history.innerHTML=arr.slice(-10).reverse()
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`).join("");
});

// 開始拍賣
function startAll(){
  db.ref("auction").set({
    item:"測試商品",
    price:0,
    name:"無",
    endAt:Date.now()+60000,
    ended:false
  });
}

</script>

</body>
</html>
