<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（最終完整版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("bg.png") no-repeat center center fixed;
  background-size:cover;

  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:30px 0;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:0;
}

.box{
  position:relative;
  z-index:1;
  background:rgba(0,0,0,0.65);
  color:#fff;
  padding:20px;
  margin:15px 0;
  width:360px;
  border-radius:15px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00f0ff,#7a00ff);
  color:white;
  cursor:pointer;
}

input{
  padding:8px;
  margin:5px;
  width:80%;
}

#winEffect{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:32px;
  color:gold;
  opacity:0;
  transition:.3s;
  z-index:9999;
}
#winEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.3);
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>得標紀錄（10筆）</h3>
  <div id="history"></div>
</div>

<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPwd" type="password">
  <button onclick="adminLogin()">登入</button>
</div>

<div class="box" id="adminPanel" style="display:none;">
  <h3>管理員後台</h3>
  <div id="itemsEditor"></div>
  <button onclick="saveItems()">儲存商品</button>
  <button onclick="startAll()">開始5連拍</button>
</div>

<div id="winEffect"></div>

<script>

var config={
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(config);
var db=firebase.database();

const ADMIN_PASSWORD="800430";
let isAdmin=false;

// 登入
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u) user.innerText="👤 "+u.displayName;
});

// 管理員
function adminLogin(){
  if(adminPwd.value===ADMIN_PASSWORD){
    isAdmin=true;
    adminPanel.style.display="block";
    loadItemsEditor();
  }
}

// 動畫
function showEffect(n,p){
  winEffect.innerText=`🔥 ${n} 搶標成功 $${p}`;
  winEffect.classList.add("show");
  setTimeout(()=>winEffect.classList.remove("show"),1000);
}

// UI同步
let lastPrice=0;
db.ref("auction").on("value",snap=>{
  const d=snap.val();
  if(!d)return;

  item.innerText=d.item;
  price.innerText=d.price;
  name.innerText=d.name;

  if(d.price>lastPrice){
    showEffect(d.name,d.price);
  }
  lastPrice=d.price;
});

// 倒數
setInterval(async ()=>{
  const d=(await db.ref("auction").once("value")).val();
  if(!d||!d.endAt)return;

  const t=Math.max(0,Math.floor((d.endAt-Date.now())/1000));
  time.innerText=t;

  if(t<=0 && !d.ended){
    finishAuction();
  }
},1000);

// 出價
function bid(){
  const u=firebase.auth().currentUser;
  if(!u)return alert("請登入");

  const val=parseInt(bidInput.value);
  if(isNaN(val))return;

  db.ref("auction").transaction(d=>{
    if(!d)return d;
    if(val<=d.price)return;

    d.price=val;
    d.name=u.displayName;

    if((d.endAt-Date.now())/1000<=10){
      d.endAt+=30000;
    }
    return d;
  });
}

// 🔥 關鍵：自動跳下一個
function finishAuction(){
  const ref=db.ref("auction");

  ref.transaction(d=>{
    if(!d||d.ended)return;
    d.ended=true;
    return d;
  },(e,ok,snap)=>{
    if(!ok)return;

    const d=snap.val();

    // 存歷史
    db.ref("history").push({
      item:d.item,
      name:d.name,
      price:d.price,
      time:Date.now()
    });

    // 下一個
    db.ref("currentIndex").once("value").then(s=>{
      let idx=s.val()||0;
      idx++;

      db.ref("items").once("value").then(snap=>{
        const items=snap.val();

        if(!items||idx>=items.length){
          alert("全部拍完");
          return;
        }

        const next=items[idx];

        db.ref("currentIndex").set(idx);

        db.ref("auction").set({
          item:next.item,
          price:0,
          name:"無",
          endAt:Date.now()+next.time*1000,
          ended:false
        });
      });
    });

  });
}

// 歷史顯示
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data){
    history.innerHTML="<p>尚無紀錄</p>";
    return;
  }

  let arr=[];
  for(let k in data){
    arr.push(data[k]);
  }

  history.innerHTML=arr.reverse().slice(0,10)
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`).join("");
});

// 商品編輯
function loadItemsEditor(){
  db.ref("items").once("value").then(s=>{
    let items=s.val()||[
      {item:"裝備1",time:60},
      {item:"裝備2",time:60},
      {item:"裝備3",time:60},
      {item:"裝備4",time:60},
      {item:"裝備5",time:60}
    ];

    itemsEditor.innerHTML=items.map((it,i)=>`
      <div>
        <input id="item_${i}" value="${it.item}">
        <input id="time_${i}" value="${it.time}">
      </div>
    `).join("");
  });
}

// 儲存商品
function saveItems(){
  let items=[];
  for(let i=0;i<5;i++){
    items.push({
      item:document.getElementById("item_"+i).value,
      time:parseInt(document.getElementById("time_"+i).value)
    });
  }
  db.ref("items").set(items);
}

// 開始拍賣
function startAll(){
  db.ref("items").once("value").then(s=>{
    const items=s.val();
    if(!items)return;

    db.ref("currentIndex").set(0);

    const f=items[0];

    db.ref("auction").set({
      item:f.item,
      price:0,
      name:"無",
      endAt:Date.now()+f.time*1000,
      ended:false
    });
  });
}

</script>

</body>
</html>
