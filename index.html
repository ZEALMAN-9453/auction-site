<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（最穩完整版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  text-align:center;
  background:url("bg.png") no-repeat center/cover fixed;
}
.box{
  background:rgba(0,0,0,0.6);
  color:#fff;
  padding:20px;
  margin:20px auto;
  width:340px;
  border-radius:15px;
}
button{
  padding:10px;
  border:none;
  border-radius:20px;
  background:#00bfff;
  color:#fff;
  cursor:pointer;
}
input{padding:8px;margin:5px}

/* 搶標動畫 */
#winEffect{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:32px;
  color:gold;
  opacity:0;
  transition:.3s;
  z-index:999;
}
#winEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.3);
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>得標紀錄（10筆）</h3>
  <div id="history"></div>
</div>

<div id="winEffect"></div>

<script>

// Firebase
var config={
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(config);
var db=firebase.database();

// 登入
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u) document.getElementById("user").innerText="👤 "+u.displayName;
});

// 搶標動畫
function showEffect(n,p){
  const el=document.getElementById("winEffect");
  el.innerText=`🔥 ${n} 搶標成功 $${p}`;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1000);
}

// UI同步 + 動畫
let lastPrice=0;

db.ref("auction").on("value",snap=>{
  const d=snap.val();
  if(!d) return;

  document.getElementById("item").innerText=d.item||"";
  document.getElementById("price").innerText=d.price||0;
  document.getElementById("name").innerText=d.name||"無";

  if(d.price>lastPrice){
    showEffect(d.name,d.price);
  }

  lastPrice=d.price;
});

// 倒數
setInterval(async ()=>{
  const d=(await db.ref("auction").once("value")).val();
  if(!d||!d.endAt) return;

  const t=Math.max(0,Math.floor((d.endAt-Date.now())/1000));
  document.getElementById("time").innerText=t;

  if(t<=0 && !d.ended){
    finishAuction();
  }
},1000);

// 出價
function bid(){
  const u=firebase.auth().currentUser;
  if(!u) return alert("請登入");

  const val=parseInt(document.getElementById("bidInput").value);
  if(isNaN(val)) return;

  db.ref("auction").transaction(d=>{
    if(!d) return d;
    if(val<=d.price) return;

    d.price=val;
    d.name=u.displayName;

    if((d.endAt-Date.now())/1000<=10){
      d.endAt+=30000;
    }

    return d;
  });
}

// 結束（防重複 + 正確寫入）
function finishAuction(){
  const ref=db.ref("auction");

  ref.transaction(d=>{
    if(!d||d.ended) return;
    d.ended=true;
    return d;
  },(e,ok,snap)=>{
    if(!ok) return;

    const d=snap.val();

    db.ref("history").push({
      item:d.item||"未知",
      name:d.name||"無",
      price:d.price||0,
      time:Date.now()
    });
  });
}

// 🔥 得標紀錄（穩定寫法）
db.ref("history").on("value",snap=>{
  const data=snap.val();

  if(!data){
    document.getElementById("history").innerHTML="<p>尚無紀錄</p>";
    return;
  }

  let arr=[];

  for(let key in data){
    arr.push(data[key]);
  }

  document.getElementById("history").innerHTML=
    arr.reverse()
       .slice(0,10)
       .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
       .join("");
});

</script>

</body>
</html>
