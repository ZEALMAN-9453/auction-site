<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（穩定最終版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("bg.png") no-repeat center/cover fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}
.box{
  background:rgba(0,0,0,0.75);
  color:#fff;
  padding:20px;
  margin:10px;
  width:360px;
  border-radius:15px;
  text-align:center;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00bfff;
  color:white;
}
input{
  padding:8px;
  margin:5px;
  width:80%;
}

/* 出價動畫 */
#bidEffect{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.3);
  font-size:46px;
  font-weight:bold;
  text-align:center;
  color:#fff;
  opacity:0;
  transition:.25s;
  z-index:9999;
  text-shadow:
    0 0 10px #fff,
    0 0 20px #ffcc00,
    0 0 40px #ff9900,
    0 0 80px #ff6600;
}
#bidEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.5);
}
#bidEffect .money{
  display:block;
  font-size:56px;
  color:#ffd700;
}

/* 得標動畫 */
#winEffect{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.6);
  font-size:32px;
  color:gold;
  opacity:0;
  transition:.25s;
}
#winEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.2);
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="bidder">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>得標紀錄（10筆）</h3>
  <div id="history"></div>
</div>

<div id="bidEffect"></div>
<div id="winEffect"></div>

<script>

// Firebase
firebase.initializeApp({
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=firebase.database();

// DOM
const elItem=item;
const elPrice=price;
const elBidder=bidder;
const elTime=time;
const elHist=history;

// 登入
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

// 同步
let current=null;
db.ref("auction").on("value",snap=>{
  current=snap.val();
  if(!current)return;

  elItem.innerText=current.item;
  elPrice.innerText=current.price;
  elBidder.innerText=current.name;
});

// 倒數
setInterval(()=>{
  if(!current)return;

  const t=Math.max(0,Math.floor((current.endAt-Date.now())/1000));
  elTime.innerText=t;

  if(t<=0 && !current.ended){
    finish();
  }
},1000);

// 出價動畫
function showBid(name,price){
  bidEffect.innerHTML=`🔥 ${name}<div class="money">$${price}</div>`;
  bidEffect.classList.add("show");
  setTimeout(()=>bidEffect.classList.remove("show"),800);
}

// 出價（🔥修正版）
function bid(){
  const u=firebase.auth().currentUser;
  if(!u)return alert("請登入");

  const val=parseInt(bidInput.value);
  if(isNaN(val))return;

  const name=u.displayName||u.email;

  db.ref("auction").transaction(d=>{
    if(!d)return d;
    if(val<=d.price)return;

    d.price=val;
    d.name=name;

    if((d.endAt-Date.now())/1000<=10){
      d.endAt+=30000;
    }

    // 🔥 成功才動畫（關鍵）
    setTimeout(()=>showBid(name,val),50);

    return d;
  });
}

// 得標動畫
function showWin(txt){
  winEffect.innerText=txt;
  winEffect.classList.add("show");
  setTimeout(()=>winEffect.classList.remove("show"),1200);
}

// 結束
function finish(){
  db.ref("auction").transaction(d=>{
    if(!d||d.ended)return;
    d.ended=true;
    return d;
  },(e,ok,snap)=>{
    if(!ok)return;

    const d=snap.val();

    if(d.price>0){
      db.ref("history").push({
        item:d.item,
        name:d.name,
        price:d.price,
        time:Date.now()
      });

      showWin(`🎉 ${d.name} 得標 ${d.price}`);

      db.ref("history").once("value").then(s=>{
        const arr=Object.entries(s.val()||{})
          .map(([k,v])=>({k,time:v.time}))
          .sort((a,b)=>a.time-b.time);

        if(arr.length>10){
          arr.slice(0,arr.length-10)
          .forEach(x=>db.ref("history/"+x.k).remove());
        }
      });
    }
  });
}

// 歷史
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data){
    elHist.innerHTML="尚無紀錄";
    return;
  }

  let arr=Object.values(data);
  arr.sort((a,b)=>b.time-a.time);

  elHist.innerHTML=arr.slice(0,10)
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
    .join("");
});

</script>

</body>
</html>
