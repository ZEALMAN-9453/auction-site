<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>拍賣系統</title>

  <!-- Firebase v8（適合你現在） -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }
    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    .admin {
      border: 2px dashed red;
    }
  </style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <input id="username" placeholder="你的名字">
  <input id="bid" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>

  <p id="status" style="color:red;"></p>
</div>

<div class="box admin">
  <h3>管理員</h3>
  <input id="adminPass" placeholder="管理員密碼">
  <input id="newItem" placeholder="商品名稱">
  <button onclick="startAuction()">開始拍賣</button>
</div>

<script>
  // 🔥 Firebase 設定（已幫你放好）
  var firebaseConfig = {
    apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
    authDomain: "auction-app-e04f8.firebaseapp.com",
    databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "auction-app-e04f8",
    storageBucket: "auction-app-e04f8.firebasestorage.app",
    messagingSenderId: "361966099614",
    appId: "1:361966099614:web:447de3e0bddbc295942f8f"
  };

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  // 🔐 管理員密碼（可自己改）
  const ADMIN_PASSWORD = "123456";

  // 📡 即時同步
  db.ref("auction").on("value", snap => {
    const data = snap.val();
    if (!data) return;

    document.getElementById("item").innerText = "拍賣商品：" + data.item;
    document.getElementById("price").innerText = data.price;
    document.getElementById("name").innerText = data.name;
    document.getElementById("time").innerText = data.time;

    if (data.ended) {
      document.getElementById("status").innerText = "拍賣已結束";
    } else {
      document.getElementById("status").innerText = "";
    }
  });

  // 💰 出價
  function bid() {
    const username = document.getElementById("username").value.trim();
    const bidPrice = parseInt(document.getElementById("bid").value);

    if (!username || isNaN(bidPrice)) {
      alert("請填名字與出價");
      return;
    }

    db.ref("auction").once("value").then(snap => {
      const data = snap.val();

      if (!data || data.ended) {
        alert("拍賣已結束");
        return;
      }

      if (bidPrice > data.price) {

        let newTime = data.time;

        // 🔥 最後60秒內出價 → 延長60秒
        if (data.time <= 60) {
          newTime += 60;
        }

        db.ref("auction").update({
          price: bidPrice,
          name: username,
          time: newTime
        });

      } else {
        alert("出價要更高");
      }
    });
  }

  // ⏱️ 倒數（每秒）
  setInterval(() => {
    db.ref("auction").once("value").then(snap => {
      const data = snap.val();
      if (!data) return;

      if (!data.ended && data.time > 0) {
        db.ref("auction/time").set(data.time - 1);
      }

      if (data.time <= 0 && !data.ended) {
        db.ref("auction/ended").set(true);
      }
    });
  }, 1000);

  // 🧠 管理員開始拍賣
  function startAuction() {
    const pass = document.getElementById("adminPass").value;
    const item = document.getElementById("newItem").value.trim();

    if (pass !== ADMIN_PASSWORD) {
      alert("管理員密碼錯誤");
      return;
    }

    if (!item) {
      alert("請輸入商品名稱");
      return;
    }

    db.ref("auction").set({
      item: item,
      price: 0,
      name: "無",
      time: 60,
      ended: false
    });
  }
</script>

</body>
</html>
