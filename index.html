<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（最穩版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background: url("bg.png") no-repeat center center fixed;
  background-size: cover;
}
body::before {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  z-index:-1;
}
.box {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  color:white;
  padding:20px;
  margin:20px auto;
  width:340px;
  border-radius:15px;
}
button {
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background: linear-gradient(45deg,#00f0ff,#7a00ff);
  color:white;
  cursor:pointer;
}
input {
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button id="loginBtn">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button id="bidBtn">出價</button>
</div>

<div class="box">
  <h3>排行榜</h3>
  <div id="rank"></div>
</div>

<div class="box">
  <h3>得標紀錄</h3>
  <div id="history"></div>
</div>

<!-- 管理員登入 -->
<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPwd" type="password" placeholder="輸入密碼">
  <button id="adminLoginBtn">登入</button>
</div>

<!-- 管理員後台 -->
<div class="box" id="adminPanel" style="display:none;">
  <h3>管理員後台</h3>
  <div id="itemsEditor"></div>
  <button id="saveItemsBtn">儲存商品</button>
  <button id="startBtn">開始5連拍</button>
</div>

<script>

// ===== 防爆 =====
window.onerror = function(msg, url, line){
  alert("JS錯誤: "+msg+" 行:"+line);
};

// ===== Firebase =====
var firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ===== 管理員 =====
const ADMIN_PASSWORD = "800430";
let isAdmin = false;

// ===== DOM READY（關鍵，保證按鈕會動）=====
document.addEventListener("DOMContentLoaded", function(){

  document.getElementById("loginBtn").onclick = login;
  document.getElementById("bidBtn").onclick = bid;
  document.getElementById("adminLoginBtn").onclick = adminLogin;
  document.getElementById("startBtn").onclick = startAll;
  document.getElementById("saveItemsBtn").onclick = saveItems;

});

// ===== 登入 =====
function login(){
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

firebase.auth().onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText="👤 "+user.displayName;
  }
});

// ===== 管理員登入 =====
function adminLogin(){
  const pwd = document.getElementById("adminPwd").value.trim();

  if(pwd === ADMIN_PASSWORD){
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    alert("登入成功");
    loadItemsEditor();
  }else{
    alert("密碼錯誤");
  }
}

// ===== UI同步 =====
db.ref("auction").on("value",snap=>{
  const d=snap.val();
  if(!d)return;

  document.getElementById("item").innerText = d.item || "";
  document.getElementById("price").innerText = d.price || 0;
  document.getElementById("name").innerText = d.name || "無";
});

// ===== 倒數 =====
setInterval(async ()=>{
  const snap = await db.ref("auction").once("value");
  const d = snap.val();
  if(!d || !d.endAt) return;

  const left = Math.max(0, Math.floor((d.endAt - Date.now())/1000));
  document.getElementById("time").innerText = left;

  if(left <= 0 && !d.ended){
    finishAuction(d);
  }
},1000);

// ===== 出價 =====
function bid(){
  const user = firebase.auth().currentUser;
  if(!user) return alert("請先登入");

  const priceVal = parseInt(document.getElementById("bidInput").value);
  if(isNaN(priceVal)) return;

  db.ref("auction").once("value").then(s=>{
    const d=s.val();
    if(priceVal <= d.price) return;

    let endAt = d.endAt;
    if((d.endAt - Date.now())/1000 <= 10){
      endAt += 30000;
    }

    db.ref("auction").update({
      price:priceVal,
      name:user.displayName,
      endAt:endAt
    });

    db.ref("auction/bids/"+user.uid).set({
      price:priceVal,
      name:user.displayName
    });
  });
}

// ===== 自動下一個 =====
function finishAuction(d){

  db.ref("history").push({
    item:d.item,
    name:d.name,
    price:d.price
  });

  db.ref("currentIndex").once("value").then(iSnap=>{
    let i = (iSnap.val() || 0) + 1;

    db.ref("items").once("value").then(snap=>{
      const items = snap.val();

      if(!items || i >= items.length){
        alert("全部拍完");
        db.ref("auction/ended").set(true);
        return;
      }

      const next = items[i];

      db.ref("currentIndex").set(i);

      db.ref("auction").set({
        item:next.item,
        price:0,
        name:"無",
        endAt:Date.now()+next.time*1000,
        ended:false,
        bids:{}
      });
    });
  });
}

// ===== 開始5連拍 =====
function startAll(){

  if(!isAdmin) return alert("你沒有權限");

  db.ref("items").once("value").then(snap=>{
    const items = snap.val();
    if(!items) return alert("請先設定商品");

    db.ref("currentIndex").set(0);

    const first = items[0];

    db.ref("auction").set({
      item:first.item,
      price:0,
      name:"無",
      endAt:Date.now()+first.time*1000,
      ended:false,
      bids:{}
    });
  });
}

// ===== 編輯商品 =====
function loadItemsEditor(){

  db.ref("items").once("value").then(snap=>{
    let items = snap.val() || [
      {item:"裝備1",time:60},
      {item:"裝備2",time:60},
      {item:"裝備3",time:60},
      {item:"裝備4",time:60},
      {item:"裝備5",time:60}
    ];

    let html = "";

    items.forEach((it,i)=>{
      html += `
        <div>
          <input id="item_${i}" value="${it.item}">
          <input id="time_${i}" type="number" value="${it.time}" style="width:60px">
        </div>
      `;
    });

    document.getElementById("itemsEditor").innerHTML = html;
  });
}

// ===== 儲存商品 =====
function saveItems(){

  if(!isAdmin) return alert("你沒有權限");

  let items = [];

  for(let i=0;i<5;i++){
    const name = document.getElementById("item_"+i).value;
    const time = parseInt(document.getElementById("time_"+i).value);

    if(!name || isNaN(time)) return alert("第 "+(i+1)+" 格錯誤");

    items.push({item:name, time:time});
  }

  db.ref("items").set(items).then(()=>{
    alert("儲存成功");
  });
}

// ===== 排行榜 =====
db.ref("auction/bids").on("value",snap=>{
  const data=snap.val();
  if(!data){
    document.getElementById("rank").innerHTML="";
    return;
  }

  let arr=Object.values(data).sort((a,b)=>b.price-a.price);

  document.getElementById("rank").innerHTML =
    arr.map(u=>`<p>${u.name} - ${u.price}</p>`).join("");
});

// ===== 歷史 =====
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data){
    document.getElementById("history").innerHTML="";
    return;
  }

  document.getElementById("history").innerHTML =
    Object.values(data).reverse()
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
    .join("");
});

</script>

</body>
</html>
