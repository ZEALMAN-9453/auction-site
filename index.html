<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.box { background:white; padding:20px; margin:20px auto; width:320px; border-radius:10px; }
button { padding:10px 20px; margin-top:10px; cursor:pointer; }
.admin { border:2px dashed red; }
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <p id="user"></p>

  <input id="bid" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>

  <button onclick="login()">Google登入</button>
  <button onclick="logout()">登出</button>

  <p id="status" style="color:red;"></p>
</div>

<div class="box">
  <h3>排行榜 TOP 5</h3>
  <div id="ranking"></div>
</div>

<div class="box admin">
  <h3>管理員</h3>
  <input id="adminKey" placeholder="管理員密碼">
  <input id="newItem" placeholder="商品名稱">
  <button onclick="startAuction()">開始拍賣</button>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var auth = firebase.auth();

let currentUser = null;

// 🔐 登入狀態
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    document.getElementById("user").innerText = "登入：" + user.displayName;
  } else {
    currentUser = null;
    document.getElementById("user").innerText = "未登入";
  }
});

// Google登入
function login() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// 登出
function logout() {
  auth.signOut();
}

// 📡 即時同步
db.ref("auction").on("value", snap => {
  const data = snap.val();
  if (!data) return;

  document.getElementById("item").innerText = "拍賣商品：" + data.item;
  document.getElementById("price").innerText = data.price;
  document.getElementById("name").innerText = data.name;
  document.getElementById("time").innerText = data.time;

  if (data.ended) {
    document.getElementById("status").innerText = "拍賣已結束";
  } else {
    document.getElementById("status").innerText = "";
  }

  // 排行榜
  if (data.bids) {
    const sorted = Object.values(data.bids)
      .sort((a,b)=>b.price-a.price)
      .slice(0,5);

    let html = "";
    sorted.forEach((b,i)=>{
      html += `<p>${i+1}. ${b.name} - ${b.price}</p>`;
    });
    document.getElementById("ranking").innerHTML = html;
  }
});

// 💰 出價（已鎖身份）
function bid() {
  if (!currentUser) {
    alert("請先登入");
    return;
  }

  const bidPrice = parseInt(document.getElementById("bid").value);

  db.ref("auction").once("value").then(snap => {
    const data = snap.val();

    if (data.ended) return alert("已結束");

    if (bidPrice > data.price) {

      let newTime = data.time;
      if (data.time <= 60) newTime += 60;

      db.ref("auction").update({
        price: bidPrice,
        name: currentUser.displayName
      });

      db.ref("auction/bids").push({
        name: currentUser.displayName,
        uid: currentUser.uid,
        price: bidPrice
      });

    } else {
      alert("出價太低");
    }
  });
}

// ⏱️ 倒數
setInterval(()=>{
  db.ref("auction").once("value").then(snap=>{
    const data = snap.val();
    if (!data) return;

    if (!data.ended && data.time > 0) {
      db.ref("auction/time").set(data.time - 1);
    }

    if (data.time <= 0 && !data.ended) {
      db.ref("auction/ended").set(true);
    }
  });
},1000);

// 🧠 管理員
function startAuction() {
  const pass = document.getElementById("adminKey").value;
  const item = document.getElementById("newItem").value;

  if (pass !== "123456") return alert("密碼錯誤");

  db.ref("auction").set({
    item: item,
    price: 0,
    name: "無",
    time: 60,
    ended: false,
    bids: {}
  });
}
</script>

</body>
</html>
