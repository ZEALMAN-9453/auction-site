<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.box {
  background:white; padding:20px; margin:20px auto;
  width:320px; border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input { width:90%; padding:10px; margin:5px; }
button { padding:10px 20px; cursor:pointer; }
.rank { text-align:left; }
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <input id="username" placeholder="你的名字">
  <input id="bid" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>

  <p id="status" style="color:red;"></p>
</div>

<div class="box">
  <h3>排行榜 🏆</h3>
  <div id="rank"></div>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var auth = firebase.auth();

let uid = null;

// 🔐 匿名登入
auth.signInAnonymously();

auth.onAuthStateChanged(user=>{
  if(user){
    uid = user.uid;
    console.log("UID:", uid);
  }
});

// 📡 同步
db.ref("auction").on("value", snap=>{
  const d = snap.val();
  if(!d) return;

  item.innerText = "拍賣商品："+d.item;
  price.innerText = d.price;
  name.innerText = d.name;
  time.innerText = d.time;
});

// 🏆 排行榜（用UID）
db.ref("rank").on("value", snap=>{
  const data = snap.val();
  if(!data) return;

  let html = "";
  Object.values(data)
    .sort((a,b)=>b.score-a.score)
    .forEach((u,i)=>{
      html += `${i+1}. ${u.name}（${u.score}次）<br>`;
    });

  rank.innerHTML = html;
});

// 💰 出價
function bid(){
  const username = document.getElementById("username").value.trim();
  const bidPrice = parseInt(document.getElementById("bid").value);

  if(!uid) return alert("登入中");
  if(!username || !bidPrice) return alert("填資料");

  db.ref("auction").once("value").then(snap=>{
    const d = snap.val();
    if(d.ended) return alert("已結束");

    if(bidPrice > d.price){

      let newTime = d.time;
      if(d.time <= 60) newTime += 60;

      db.ref("auction").update({
        price: bidPrice,
        name: username,
        time: newTime
      });

      // 🔥 用 UID 記排行榜
      db.ref("rank/"+uid).transaction(v=>{
        if(v){
          v.score += 1;
          v.name = username;
          return v;
        } else {
          return {name:username, score:1};
        }
      });

    } else {
      alert("出價太低");
    }
  });
}

// ⏱️ 倒數
setInterval(()=>{
  db.ref("auction").once("value").then(snap=>{
    const d = snap.val();
    if(!d) return;

    if(d.time > 0){
      db.ref("auction/time").set(d.time-1);
    } else if(!d.ended){
      db.ref("auction/ended").set(true);
    }
  });
},1000);
</script>

</body>
</html>
