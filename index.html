<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>жӢҚиіЈзі»зөұ жңҖзөӮе®Ңж•ҙзүҲ</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("bg.png") no-repeat center/cover fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}
.box{
  background:rgba(0,0,0,0.75);
  color:#fff;
  padding:20px;
  margin:10px;
  width:360px;
  border-radius:15px;
  text-align:center;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00bfff;
  color:white;
}
input{
  padding:8px;
  margin:5px;
  width:80%;
}

/* еӢ•з•« */
#win{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:30px;
  color:gold;
  opacity:0;
  transition:.3s;
  text-shadow:0 0 20px gold;
}
#win.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.3);
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">жӢҚиіЈе•Ҷе“Ғ</h2>
  <p>жңҖй«ҳеғ№пјҡ<span id="price">0</span></p>
  <p>еҮәеғ№иҖ…пјҡ<span id="name">з„Ў</span></p>
  <p>еү©йӨҳжҷӮй–“пјҡ<span id="time">0</span> з§’</p>

  <button onclick="login()">Googleзҷ»е…Ҙ</button>
  <p id="user"></p>

  <input id="bidInput" type="number">
  <button onclick="bid()">еҮәеғ№</button>
</div>

<div class="box">
  <h3>еҫ—жЁҷзҙҖйҢ„пјҲ10зӯҶпјү</h3>
  <div id="history"></div>
</div>

<div class="box">
  <h3>з®ЎзҗҶе“Ўзҷ»е…Ҙ</h3>
  <input id="adminPwd" type="password">
  <button onclick="adminLogin()">зҷ»е…Ҙ</button>
</div>

<div class="box" id="adminPanel" style="display:none;">
  <h3>5йҖЈжӢҚиЁӯе®ҡ</h3>
  <div id="editor"></div>
  <button onclick="saveItems()">е„Іеӯҳ</button>
  <button onclick="start()">й–Ӣе§Ӣ5йҖЈжӢҚ</button>
</div>

<div id="win"></div>

<script>

// Firebase
firebase.initializeApp({
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = firebase.database();

const ADMIN_PASSWORD = "800430";

// зҷ»е…Ҙ
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u) user.innerText="рҹ‘Ө "+(u.displayName||u.email);
});

// з®ЎзҗҶе“Ў
function adminLogin(){
  if(adminPwd.value===ADMIN_PASSWORD){
    adminPanel.style.display="block";
    loadItems();
  }else{
    alert("йҢҜиӘӨ");
  }
}

// ијүе…Ҙе•Ҷе“Ғ
function loadItems(){
  db.ref("items").once("value").then(s=>{
    let items=s.val()||[
      {item:"е•Ҷе“Ғ1",time:60},
      {item:"е•Ҷе“Ғ2",time:60},
      {item:"е•Ҷе“Ғ3",time:60},
      {item:"е•Ҷе“Ғ4",time:60},
      {item:"е•Ҷе“Ғ5",time:60}
    ];

    editor.innerHTML=items.map((it,i)=>`
      <div>
        <input id="name_${i}" value="${it.item}">
        <input id="time_${i}" value="${it.time}">
      </div>
    `).join("");
  });
}

// е„Іеӯҳ
function saveItems(){
  let arr=[];
  for(let i=0;i<5;i++){
    arr.push({
      item:document.getElementById("name_"+i).value,
      time:parseInt(document.getElementById("time_"+i).value)
    });
  }
  db.ref("items").set(arr);
  alert("е®ҢжҲҗ");
}

// й–Ӣе§Ӣ
function start(){
  db.ref("items").once("value").then(s=>{
    const items=s.val();
    if(!items)return;

    db.ref("currentIndex").set(0);

    db.ref("auction").set({
      item:items[0].item,
      price:0,
      name:"з„Ў",
      endAt:Date.now()+items[0].time*1000,
      ended:false
    });
  });
}

// еҗҢжӯҘ
let current=null;
db.ref("auction").on("value",snap=>{
  current=snap.val();
  if(!current)return;

  item.innerText=current.item;
  price.innerText=current.price;
  name.innerText=current.name;
});

// еҖ’ж•ё
setInterval(()=>{
  if(!current)return;

  const t=Math.max(0,Math.floor((current.endAt-Date.now())/1000));
  time.innerText=t;

  if(t<=0 && !current.ended){
    finish();
  }
},1000);

// еҮәеғ№пјҲеҗ«е»¶й•·жҷӮй–“пјү
function bid(){
  const u=firebase.auth().currentUser;
  if(!u)return alert("и«Ӣзҷ»е…Ҙ");

  const val=parseInt(bidInput.value);
  if(isNaN(val))return;

  db.ref("auction").transaction(d=>{
    if(!d)return d;
    if(val<=d.price)return;

    d.price=val;
    d.name=u.displayName||u.email||"зҺ©е®¶";

    // рҹ”Ҙ жңҖеҫҢ10з§’е»¶й•·30з§’
    if((d.endAt-Date.now())/1000<=10){
      d.endAt+=30000;
    }

    return d;
  });
}

// еӢ•з•«
function show(text){
  win.innerText=text;
  win.classList.add("show");
  setTimeout(()=>win.classList.remove("show"),1500);
}

// зөҗжқҹ
function finish(){

  db.ref("auction").transaction(d=>{
    if(!d||d.ended)return;
    d.ended=true;
    return d;
  },(e,ok,snap)=>{
    if(!ok)return;

    const d=snap.val();

    if(d.price>0 && d.name!=="з„Ў"){

      db.ref("history").push({
        item:d.item,
        name:d.name,
        price:d.price,
        time:Date.now()
      });

      show(`рҹҺү ${d.name} еҫ—жЁҷ ${d.price}`);

      // дҝқз•ҷ10зӯҶ
      db.ref("history").once("value").then(s=>{
        const data=s.val();
        if(!data)return;
        const keys=Object.keys(data);
        if(keys.length>10){
          keys.sort().slice(0,keys.length-10)
          .forEach(k=>db.ref("history/"+k).remove());
        }
      });

    }else{
      show("вқҢ жөҒжЁҷ");
    }

    db.ref("currentIndex").once("value").then(s=>{
      let idx=s.val()||0;
      idx++;

      db.ref("items").once("value").then(snap=>{
        const items=snap.val();

        if(idx>=items.length){
          show("рҹҸҒ зөҗжқҹ");
          return;
        }

        db.ref("currentIndex").set(idx);

        db.ref("auction").set({
          item:items[idx].item,
          price:0,
          name:"з„Ў",
          endAt:Date.now()+items[idx].time*1000,
          ended:false
        });
      });
    });

  });
}

// жӯ·еҸІйЎҜзӨә
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data){
    history.innerHTML="е°ҡз„ЎзҙҖйҢ„";
    return;
  }

  let arr=Object.values(data);
  arr.sort((a,b)=>b.time-a.time);

  history.innerHTML=arr.slice(0,10)
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
    .join("");
});

</script>

</body>
</html>
