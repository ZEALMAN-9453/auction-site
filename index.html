<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.box {
  background:white; padding:20px; margin:20px auto;
  width:320px; border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input { width:90%; padding:10px; margin:5px; }
button { padding:10px 20px; margin-top:10px; cursor:pointer; }
</style>
</head>

<body>

<!-- 拍賣 -->
<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<!-- 排行榜 -->
<div class="box">
  <h3>排行榜 TOP 5</h3>
  <div id="rank"></div>
</div>

<!-- 管理員登入 -->
<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPass" type="password" placeholder="輸入密碼">
  <button onclick="adminLogin()">登入</button>
</div>

<!-- 管理員控制 -->
<div class="box" id="adminBox" style="display:none;">
  <h3>管理員控制</h3>
  <input id="setItem" placeholder="商品名稱">
  <input id="setTime" type="number" placeholder="秒數">
  <button onclick="startAuction()">開始拍賣</button>
</div>

<script>
// ===== Firebase 設定（你的）=====
var firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ===== Google 登入 =====
function login() {
  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

// 顯示使用者 + 建立 users 對照
firebase.auth().onAuthStateChanged(user => {
  if (user) {
    document.getElementById("user").innerText = "👤 " + user.displayName;

    db.ref("users/" + user.uid).set({
      name: user.displayName
    });
  }
});

// ===== 同步拍賣 =====
db.ref("auction").on("value", snap => {
  const d = snap.val();
  if (!d) return;

  document.getElementById("item").innerText = "拍賣商品：" + d.item;
  document.getElementById("price").innerText = d.price;
  document.getElementById("name").innerText = d.name;
});

// ===== 倒數（穩定版）=====
setInterval(() => {
  db.ref("auction").once("value").then(snap => {
    const d = snap.val();
    if (!d || !d.endAt) return;

    const left = Math.max(0, Math.floor((d.endAt - Date.now()) / 1000));
    document.getElementById("time").innerText = left;

    if (left <= 0 && !d.ended) {
      db.ref("auction/ended").set(true);
    }
  });
}, 1000);

// ===== 出價（含最後10秒+30秒）=====
function bid() {
  const user = firebase.auth().currentUser;
  if (!user) return alert("請先登入");

  const price = parseInt(document.getElementById("bidInput").value);

  db.ref("auction").once("value").then(snap => {
    const d = snap.val();
    if (!d || d.ended) return;

    if (price <= d.price) return alert("要更高");

    const now = Date.now();
    const left = Math.floor((d.endAt - now) / 1000);

    let newEndAt = d.endAt;

    // 🔥 最後10秒 → +30秒
    if (left <= 10) {
      newEndAt = d.endAt + 30000;
    }

    db.ref("auction").update({
      price: price,
      name: user.displayName,
      endAt: newEndAt
    });

    db.ref("auction/bids/" + user.uid).set({
      price: price,
      name: user.displayName
    });
  });
}

// ===== 排行榜（顯示名字）=====
db.ref("auction/bids").on("value", snap => {
  const data = snap.val();
  if (!data) return;

  let arr = Object.entries(data).map(([uid, v]) => ({
    uid,
    price: v.price,
    name: v.name || "匿名"
  }));

  arr.sort((a,b)=>b.price-a.price);
  arr = arr.slice(0,5);

  let html = "";
  arr.forEach((u,i)=>{
    html += `<p>${i+1}. ${u.name} - ${u.price}</p>`;
  });

  document.getElementById("rank").innerHTML = html;
});

// ===== 管理員（密碼版）=====
const ADMIN_PASSWORD = "800430";

function adminLogin() {
  const pass = document.getElementById("adminPass").value;

  if (pass === ADMIN_PASSWORD) {
    document.getElementById("adminBox").style.display = "block";
  } else {
    alert("密碼錯誤");
  }
}

// ===== 開始拍賣 =====
function startAuction() {
  const item = document.getElementById("setItem").value;
  const duration = parseInt(document.getElementById("setTime").value);

  const endAt = Date.now() + duration * 1000;

  db.ref("auction").set({
    item: item,
    price: 0,
    name: "無",
    ended: false,
    endAt: endAt,
    bids: {}
  });
}
</script>

</body>
</html>
