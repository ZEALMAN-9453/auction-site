<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（最終穩定版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("bg.png") no-repeat center center fixed;
  background-size:cover;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:30px 0;
}

body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:0;
}

.box{
  position:relative;
  z-index:1;
  background:rgba(0,0,0,0.65);
  color:#fff;
  padding:20px;
  margin:15px 0;
  width:360px;
  border-radius:15px;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#00f0ff,#7a00ff);
  color:white;
  cursor:pointer;
}

input{
  padding:8px;
  margin:5px;
  width:80%;
}

#winEffect{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:32px;
  color:gold;
  opacity:0;
  transition:.3s;
  z-index:9999;
}
#winEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.3);
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>得標紀錄（10筆）</h3>
  <div id="history"></div>
</div>

<div id="winEffect"></div>

<script>

// Firebase
var config={
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(config);
var db=firebase.database();

// 登入
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u) document.getElementById("user").innerText="👤 "+u.displayName;
});

// 動畫
function showEffect(n,p){
  const el=document.getElementById("winEffect");
  el.innerText=`🔥 ${n} 搶標成功 $${p}`;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),1000);
}

// UI同步
let lastPrice=0;
db.ref("auction").on("value",snap=>{
  const d=snap.val();
  if(!d)return;

  item.innerText=d.item||"";
  price.innerText=d.price||0;
  name.innerText=d.name||"無";

  if(d.price>lastPrice){
    showEffect(d.name,d.price);
  }
  lastPrice=d.price;
});

// 倒數
setInterval(async ()=>{
  const d=(await db.ref("auction").once("value")).val();
  if(!d||!d.endAt)return;

  const t=Math.max(0,Math.floor((d.endAt-Date.now())/1000));
  time.innerText=t;

  if(t<=0 && !d.ended){
    finishAuction();
  }
},1000);

// 出價
function bid(){
  const u=firebase.auth().currentUser;
  if(!u)return alert("請登入");

  const val=parseInt(bidInput.value);
  if(isNaN(val))return;

  db.ref("auction").transaction(d=>{
    if(!d)return d;
    if(val<=d.price)return;

    d.price=val;
    d.name=u.displayName;

    if((d.endAt-Date.now())/1000<=10){
      d.endAt+=30000;
    }
    return d;
  });
}

// 結束＋跳下一個
function finishAuction(){
  const ref=db.ref("auction");

  ref.transaction(d=>{
    if(!d||d.ended)return;
    d.ended=true;
    return d;
  },(e,ok,snap)=>{
    if(!ok)return;

    const d=snap.val();

    // 存歷史（一定有資料）
    db.ref("history").push({
      item:d.item||"未知",
      name:d.name||"無",
      price:d.price||0,
      time:Date.now()
    });

    // 下一個
    db.ref("currentIndex").once("value").then(s=>{
      let idx=s.val()||0;
      idx++;

      db.ref("items").once("value").then(snap=>{
        const items=snap.val();

        if(!items||idx>=items.length){
          alert("全部拍完");
          return;
        }

        const next=items[idx];

        db.ref("currentIndex").set(idx);

        db.ref("auction").set({
          item:next.item,
          price:0,
          name:"無",
          endAt:Date.now()+next.time*1000,
          ended:false
        });
      });
    });

  });
}

// 🔥 歷史顯示（完全穩定版）
db.ref("history").on("value",snap=>{

  const data = snap.val();

  if(!data){
    history.innerHTML = "<p>尚無紀錄</p>";
    return;
  }

  let arr = [];

  for(let key in data){
    const h = data[key];

    if(!h || !h.item || !h.name) continue;

    arr.push({
      item:h.item,
      name:h.name,
      price:h.price||0,
      time:h.time||0
    });
  }

  if(arr.length===0){
    history.innerHTML="<p>尚無紀錄</p>";
    return;
  }

  arr.sort((a,b)=>b.time-a.time);

  history.innerHTML =
    arr.slice(0,10)
       .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
       .join("");

});

</script>

</body>
</html>
