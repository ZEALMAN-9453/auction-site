<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.box { background:white; padding:20px; margin:20px auto; width:320px; border-radius:10px; }
.admin { border:2px dashed red; display:none; }
button { padding:10px 20px; margin-top:10px; }
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bid" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>

  <p id="status" style="color:red;"></p>
</div>

<div class="box admin" id="adminBox">
  <h3>管理員</h3>
  <input id="newItem" placeholder="商品名稱">
  <button onclick="startAuction()">開始拍賣</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMIN_UID = "貼你的UID";

// 登入
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider);
}

// 監聽登入
firebase.auth().onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerText = "👤 " + user.displayName;

    if(user.uid === ADMIN_UID){
      document.getElementById("adminBox").style.display = "block";
    }
  }
});

// 出價
function bid(){
  const user = firebase.auth().currentUser;
  const bidPrice = parseInt(document.getElementById("bid").value);

  if(!user){ alert("請先登入"); return; }

  db.ref("auction").once("value").then(snap=>{
    const data = snap.val();

    if(data.ended){ alert("已結束"); return; }

    if(bidPrice > data.price){
      let newTime = data.time;
      if(data.time <= 60){ newTime += 60; }

      db.ref("auction").update({
        price: bidPrice,
        name: user.displayName,
        time: newTime
      });

    }else{
      alert("出價要更高");
    }
  });
}

// 倒數
setInterval(()=>{
  db.ref("auction").once("value").then(snap=>{
    const data = snap.val();
    if(!data) return;

    if(data.time > 0){
      db.ref("auction/time").set(data.time - 1);
    }else{
      db.ref("auction/ended").set(true);
    }
  });
},1000);

// 管理員
function startAuction(){
  const user = firebase.auth().currentUser;
  if(!user || user.uid !== ADMIN_UID){
    alert("你不是管理員");
    return;
  }

  const item = document.getElementById("newItem").value;

  db.ref("auction").set({
    item:item,
    price:0,
    name:"無",
    time:60,
    ended:false
  });
}

// 同步
db.ref("auction").on("value",snap=>{
  const data = snap.val();
  if(!data) return;

  item.innerText = "拍賣商品：" + data.item;
  price.innerText = data.price;
  name.innerText = data.name;
  time.innerText = data.time;

  status.innerText = data.ended ? "拍賣已結束" : "";
});
</script>

</body>
</html>
