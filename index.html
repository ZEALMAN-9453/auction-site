<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統 完整版</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("bg.png") no-repeat center/cover fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}
.box{
  background:rgba(0,0,0,0.75);
  color:#fff;
  padding:20px;
  margin:10px;
  width:360px;
  border-radius:15px;
  text-align:center;
}
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00bfff;
  color:white;
}
input{
  padding:8px;
  margin:5px;
  width:80%;
}

/* 🔥 動畫 */
#winEffect{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:32px;
  color:gold;
  opacity:0;
  transition:.3s;
  text-shadow:0 0 20px gold;
}
#winEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.3);
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>得標紀錄（10筆）</h3>
  <div id="history"></div>
</div>

<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPwd" type="password">
  <button onclick="adminLogin()">登入</button>
</div>

<div class="box" id="adminPanel" style="display:none;">
  <h3>管理員後台（5連拍設定）</h3>
  <div id="editor"></div>
  <button onclick="saveItems()">儲存商品</button>
  <button onclick="startAuction()">開始5連拍</button>
</div>

<div id="winEffect"></div>

<script>

// 🔥 Firebase
firebase.initializeApp({
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db = firebase.database();

const ADMIN_PASSWORD = "800430";

// 登入
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u) user.innerText="👤 "+(u.displayName||u.email);
});

// 管理員登入
function adminLogin(){
  if(adminPwd.value===ADMIN_PASSWORD){
    adminPanel.style.display="block";
    loadEditor();
  }else{
    alert("密碼錯誤");
  }
}

// 載入商品設定
function loadEditor(){
  db.ref("items").once("value").then(s=>{
    let items=s.val()||[
      {item:"商品1",time:60},
      {item:"商品2",time:60},
      {item:"商品3",time:60},
      {item:"商品4",time:60},
      {item:"商品5",time:60}
    ];

    editor.innerHTML = items.map((it,i)=>`
      <div>
        <input id="name_${i}" value="${it.item}">
        <input id="time_${i}" value="${it.time}">
      </div>
    `).join("");
  });
}

// 儲存商品
function saveItems(){
  let arr=[];
  for(let i=0;i<5;i++){
    arr.push({
      item:document.getElementById("name_"+i).value,
      time:parseInt(document.getElementById("time_"+i).value)
    });
  }
  db.ref("items").set(arr);
  alert("已儲存");
}

// 開始5連拍
function startAuction(){
  db.ref("items").once("value").then(s=>{
    const items=s.val();
    if(!items)return;

    db.ref("currentIndex").set(0);

    db.ref("auction").set({
      item:items[0].item,
      price:0,
      name:"無",
      endAt:Date.now()+items[0].time*1000,
      ended:false
    });
  });
}

// 同步
let current=null;
db.ref("auction").on("value",snap=>{
  current=snap.val();
  if(!current)return;

  item.innerText=current.item;
  price.innerText=current.price;
  name.innerText=current.name;
});

// 倒數
setInterval(()=>{
  if(!current)return;

  const t=Math.max(0,Math.floor((current.endAt-Date.now())/1000));
  time.innerText=t;

  if(t<=0 && !current.ended){
    finish();
  }
},1000);

// 出價
function bid(){
  const u=firebase.auth().currentUser;
  if(!u)return alert("請登入");

  const val=parseInt(bidInput.value);
  if(isNaN(val))return;

  db.ref("auction").transaction(d=>{
    if(!d)return d;
    if(val<=d.price)return;

    d.price=val;
    d.name=u.displayName||u.email||"玩家";
    return d;
  });
}

// 動畫
function showWin(txt){
  winEffect.innerText=txt;
  winEffect.classList.add("show");
  setTimeout(()=>winEffect.classList.remove("show"),1500);
}

// 結束
function finish(){

  db.ref("auction").transaction(d=>{
    if(!d||d.ended)return;
    d.ended=true;
    return d;
  },(e,ok,snap)=>{
    if(!ok)return;

    const d=snap.val();

    // 🔥 寫入歷史（最多10筆）
    if(d.price>0 && d.name!=="無"){

      db.ref("history").push({
        item:d.item,
        name:d.name,
        price:d.price,
        time:Date.now()
      });

      showWin(`🎉 ${d.name} 得標 ${d.price}`);

      // 🔥 限制10筆
      db.ref("history").once("value").then(s=>{
        const data=s.val();
        if(!data)return;

        const keys=Object.keys(data);
        if(keys.length>10){
          const removeKeys=keys.sort().slice(0,keys.length-10);
          removeKeys.forEach(k=>{
            db.ref("history/"+k).remove();
          });
        }
      });

    }else{
      showWin("❌ 流標");
    }

    // 下一個
    db.ref("currentIndex").once("value").then(s=>{
      let idx=s.val()||0;
      idx++;

      db.ref("items").once("value").then(snap=>{
        const items=snap.val();

        if(idx>=items.length){
          showWin("🏁 全部拍完");
          return;
        }

        db.ref("currentIndex").set(idx);

        db.ref("auction").set({
          item:items[idx].item,
          price:0,
          name:"無",
          endAt:Date.now()+items[idx].time*1000,
          ended:false
        });
      });
    });

  });
}

// 顯示歷史
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data){
    history.innerHTML="尚無紀錄";
    return;
  }

  let arr=Object.values(data);
  arr.sort((a,b)=>b.time-a.time);

  history.innerHTML=arr.slice(0,10)
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
    .join("");
});

</script>

</body>
</html>
