<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統</title>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.box {
  background:white; padding:20px; margin:20px auto; width:320px;
  border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);
}
button { padding:10px 20px; margin-top:10px; cursor:pointer; }
.admin { border:2px dashed red; display:none; }
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bid" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>
</div>

<div class="box admin" id="adminBox">
  <h3>管理員</h3>
  <input id="newItem" placeholder="商品名稱">
  <button onclick="startAuction()">開始拍賣</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getDatabase, ref, onValue, get, set, update }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;

// 登入
window.login = async () => {
  const provider = new GoogleAuthProvider();
  await signInWithPopup(auth, provider);
};

// 判斷管理員（第一個登入的人）
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  currentUser = user;
  document.getElementById("user").innerText = "👤 " + user.displayName;

  const adminRef = ref(db, "admin");

  const snap = await get(adminRef);

  if (!snap.exists()) {
    // 第一個登入的人 → 設為管理員
    await set(adminRef, user.uid);
    document.getElementById("adminBox").style.display = "block";
  } else {
    // 已有管理員 → 比對
    if (snap.val() === user.uid) {
      document.getElementById("adminBox").style.display = "block";
    }
  }
});

// 出價
window.bid = async () => {
  if (!currentUser) return alert("請先登入");

  const bidPrice = parseInt(document.getElementById("bid").value);

  const snap = await get(ref(db, "auction"));
  const data = snap.val();

  if (!data || data.ended) return alert("已結束");

  if (bidPrice > data.price) {
    let newTime = data.time;
    if (data.time <= 60) newTime += 60;

    await update(ref(db, "auction"), {
      price: bidPrice,
      name: currentUser.displayName,
      time: newTime
    });
  } else {
    alert("出價太低");
  }
};

// 倒數
setInterval(async () => {
  const snap = await get(ref(db, "auction"));
  const data = snap.val();
  if (!data) return;

  if (data.time > 0) {
    await set(ref(db, "auction/time"), data.time - 1);
  } else {
    await set(ref(db, "auction/ended"), true);
  }
}, 1000);

// 開始拍賣
window.startAuction = async () => {
  const item = document.getElementById("newItem").value;

  await set(ref(db, "auction"), {
    item: item,
    price: 0,
    name: "無",
    time: 60,
    ended: false
  });
};

// 同步
onValue(ref(db, "auction"), (snap) => {
  const data = snap.val();
  if (!data) return;

  item.innerText = "拍賣商品：" + data.item;
  price.innerText = data.price;
  name.innerText = data.name;
  time.innerText = data.time;
});
</script>

</body>
</html>
