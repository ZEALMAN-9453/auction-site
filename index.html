<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統（動畫完整版）</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("bg.png") no-repeat center/cover fixed;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

.box{
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:20px;
  margin:10px;
  width:360px;
  border-radius:15px;
  text-align:center;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#00bfff;
  color:white;
}

input{
  padding:8px;
  margin:5px;
  width:80%;
}

/* 🔥 動畫 */
#winEffect{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.5);
  font-size:32px;
  font-weight:bold;
  color:gold;
  opacity:0;
  transition:0.3s;
  z-index:9999;
  text-shadow:0 0 20px gold;
}

#winEffect.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1.3);
}
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <button onclick="login()">Google登入</button>
  <p id="user"></p>

  <input id="bidInput" type="number">
  <button onclick="bid()">出價</button>
</div>

<div class="box">
  <h3>得標紀錄（10筆）</h3>
  <div id="history"></div>
</div>

<div class="box">
  <h3>管理員登入</h3>
  <input id="adminPwd" type="password">
  <button onclick="adminLogin()">登入</button>
</div>

<div class="box" id="adminPanel" style="display:none;">
  <h3>管理員後台</h3>
  <button onclick="startAll()">開始5連拍</button>
</div>

<!-- 🔥 動畫 -->
<div id="winEffect"></div>

<script>

firebase.initializeApp({
  apiKey:"AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain:"auction-app-e04f8.firebaseapp.com",
  databaseURL:"https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app"
});
const db=firebase.database();

const ADMIN_PASSWORD="800430";

// 登入
function login(){
  firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
firebase.auth().onAuthStateChanged(u=>{
  if(u) user.innerText="👤 "+(u.displayName||u.email);
});

// 管理員
function adminLogin(){
  if(adminPwd.value===ADMIN_PASSWORD){
    adminPanel.style.display="block";
  }
}

// 🔥 動畫函式
function showWin(text){
  const el = document.getElementById("winEffect");
  el.innerText = text;
  el.classList.add("show");

  setTimeout(()=>{
    el.classList.remove("show");
  },1500);
}

// 同步
let currentAuction=null;

db.ref("auction").on("value",snap=>{
  currentAuction=snap.val();
  if(!currentAuction)return;

  item.innerText=currentAuction.item||"";
  price.innerText=currentAuction.price||0;
  name.innerText=currentAuction.name||"無";
});

// 倒數
setInterval(()=>{
  if(!currentAuction||!currentAuction.endAt)return;

  const t=Math.max(0,Math.floor((currentAuction.endAt-Date.now())/1000));
  time.innerText=t;

  if(t<=0 && !currentAuction.ended){
    finishAuction();
  }
},1000);

// 出價
function bid(){
  const u=firebase.auth().currentUser;
  if(!u)return alert("請登入");

  const val=parseInt(bidInput.value);
  if(isNaN(val))return;

  db.ref("auction").transaction(d=>{
    if(!d)return d;
    if(val<=d.price)return;

    d.price=val;
    d.name=u.displayName||u.email||"玩家";

    if((d.endAt-Date.now())/1000<=10){
      d.endAt+=30000;
    }

    return d;
  });
}

// 🔥 結束
function finishAuction(){

  db.ref("auction").transaction(d=>{
    if(!d||d.ended)return;
    d.ended=true;
    return d;
  },(e,ok,snap)=>{
    if(!ok)return;

    const d=snap.val();

    // 🔥 判斷有沒有人出價
    if(d.price>0 && d.name!=="無"){

      db.ref("history").push({
        item:d.item,
        name:d.name,
        price:d.price,
        time:Date.now()
      });

      // 🔥 動畫
      showWin(`🎉 ${d.name} 得標 ${d.price}`);

    }else{
      showWin(`❌ 流標`);
    }

    // 下一個
    db.ref("currentIndex").once("value").then(s=>{
      let idx=s.val()||0;
      idx++;

      db.ref("items").once("value").then(snap=>{
        const items=snap.val();

        if(!items||idx>=items.length){
          showWin("🏁 全部拍完");
          return;
        }

        const next=items[idx];

        db.ref("currentIndex").set(idx);

        db.ref("auction").set({
          item:next.item,
          price:0,
          name:"無",
          endAt:Date.now()+next.time*1000,
          ended:false
        });
      });
    });

  });
}

// 歷史
db.ref("history").on("value",snap=>{
  const data=snap.val();
  if(!data){
    history.innerHTML="尚無紀錄";
    return;
  }

  let arr=[];
  for(let k in data){
    const h=data[k];
    if(!h||!h.item)continue;
    arr.push(h);
  }

  arr.sort((a,b)=>b.time-a.time);

  history.innerHTML=arr.slice(0,10)
    .map(h=>`<p>${h.item} - ${h.name} (${h.price})</p>`)
    .join("");
});

// 開始
function startAll(){
  db.ref("items").once("value").then(s=>{
    const items=s.val();
    if(!items)return;

    db.ref("currentIndex").set(0);

    const f=items[0];

    db.ref("auction").set({
      item:f.item,
      price:0,
      name:"無",
      endAt:Date.now()+f.time*1000,
      ended:false
    });
  });
}

</script>

</body>
</html>
