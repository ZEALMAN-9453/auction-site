<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>拍賣系統</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; text-align:center; }
.box {
  background:white; padding:20px; margin:20px auto;
  width:320px; border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input { width:90%; padding:10px; margin:5px; }
button { padding:10px 20px; cursor:pointer; }

.rank { text-align:left; }
</style>
</head>

<body>

<div class="box">
  <h2 id="item">拍賣商品</h2>
  <p>最高價：<span id="price">0</span></p>
  <p>出價者：<span id="name">無</span></p>
  <p>剩餘時間：<span id="time">0</span> 秒</p>

  <input id="username" placeholder="你的名字">
  <input id="bid" type="number" placeholder="輸入出價">
  <button onclick="bid()">出價</button>

  <p id="status" style="color:red;"></p>
</div>

<div class="box">
  <h3>排行榜 🏆</h3>
  <div id="rank" class="rank"></div>
</div>

<div class="box">
  <h3>管理員</h3>
  <input id="adminPass" placeholder="管理員密碼">
  <button onclick="startAuction()">開始拍賣</button>
</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyAgjEi_uRKn4wgJcl4OfbxtzitysJ_APIU",
  authDomain: "auction-app-e04f8.firebaseapp.com",
  databaseURL: "https://auction-app-e04f8-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "auction-app-e04f8"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

const ADMIN_PASSWORD = "123456";

// 商品池（自動輪播）
const items = ["PS5","iPhone 15","RTX4090","Switch","MacBook"];

// 📡 同步
db.ref("auction").on("value", snap=>{
  const d = snap.val();
  if(!d) return;

  item.innerText = "拍賣商品："+d.item;
  price.innerText = d.price;
  name.innerText = d.name;
  time.innerText = d.time;

  status.innerText = d.ended ? "拍賣已結束" : "";
});

// 🏆 排行榜
db.ref("rank").on("value", snap=>{
  const data = snap.val();
  if(!data) return;

  let html = "";
  Object.entries(data)
    .sort((a,b)=>b[1]-a[1])
    .forEach(([name,score],i)=>{
      html += `${i+1}. ${name}（${score}次）<br>`;
    });

  document.getElementById("rank").innerHTML = html;
});

// 💰 出價
function bid(){
  const username = usernameInput.value;
  const bidPrice = parseInt(bidInput.value);

  if(!username || !bidPrice) return alert("填資料");

  db.ref("auction").once("value").then(snap=>{
    const d = snap.val();
    if(d.ended) return alert("已結束");

    if(bidPrice > d.price){

      let newTime = d.time;
      if(d.time <= 60) newTime += 60;

      db.ref("auction").update({
        price: bidPrice,
        name: username,
        time: newTime
      });

      // 📊 加入排行榜
      db.ref("rank/"+username).transaction(v=>{
        return (v||0)+1;
      });

    } else {
      alert("出價太低");
    }
  });
}

// ⏱️ 倒數 + 自動輪播
setInterval(()=>{
  db.ref("auction").once("value").then(snap=>{
    const d = snap.val();
    if(!d) return;

    if(d.time > 0){
      db.ref("auction/time").set(d.time-1);
    } else if(!d.ended){
      db.ref("auction/ended").set(true);

      // 🔥 自動下一個商品
      const next = items[Math.floor(Math.random()*items.length)];

      setTimeout(()=>{
        db.ref("auction").set({
          item: next,
          price: 0,
          name: "無",
          time: 60,
          ended: false
        });
      },2000);
    }
  });
},1000);

// 🧠 開始拍賣（手動）
function startAuction(){
  const pass = adminPass.value;

  if(pass !== ADMIN_PASSWORD){
    alert("錯誤");
    return;
  }

  const item = items[Math.floor(Math.random()*items.length)];

  db.ref("auction").set({
    item:item,
    price:0,
    name:"無",
    time:60,
    ended:false
  });
}
</script>

</body>
</html>
